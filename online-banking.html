<!DOCTYPE html>
<html>
<head>
    <title>Jamal | Online Banking Payment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root {
            --gold: #d4af37;
            --black: #000;
            --white: #fff;
            --dark-gray: #111;
            --gray: #aaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background-color: var(--black);
            color: var(--white);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: var(--dark-gray);
            border-bottom: 1px solid var(--gold);
        }

        .logo h1 {
            font-size: 28px;
        }

        .payment-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .payment-section {
            background-color: var(--dark-gray);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--gold);
        }

        .section-title {
            color: var(--gold);
            margin-bottom: 30px;
            font-size: 24px;
            text-align: center;
        }

        .bank-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .bank-option {
            background-color: var(--black);
            border: 1px solid var(--gray);
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .bank-option:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .bank-option.selected {
            border-color: var(--gold);
            background-color: rgba(212, 175, 55, 0.1);
        }

        .bank-option i {
            font-size: 24px;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .bank-option p {
            color: var(--white);
            margin: 0;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--white);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: var(--black);
            border: 1px solid var(--gray);
            border-radius: 4px;
            color: var(--white);
            font-size: 16px;
        }

        .form-group input:focus {
            border-color: var(--gold);
            outline: none;
        }

        .submit-btn {
            background-color: var(--gold);
            color: var(--black);
            padding: 15px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #e6c555;
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            background-color: var(--gray);
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1><a href="index.html" style="text-decoration: none; color: var(--gold)">JAMAL</a></h1>
        </div>
    </header>

    <div class="payment-container">
        <div class="payment-section">
            <h2 class="section-title">Online Banking Payment</h2>
            <form id="onlineBankingForm">
                <div class="bank-options">
                    <div class="bank-option" data-bank="maybank">
                        <i class="fas fa-university"></i>
                        <p>Maybank</p>
                    </div>
                    <div class="bank-option" data-bank="cimb">
                        <i class="fas fa-university"></i>
                        <p>CIMB Bank</p>
                    </div>
                    <div class="bank-option" data-bank="public">
                        <i class="fas fa-university"></i>
                        <p>Public Bank</p>
                    </div>
                    <div class="bank-option" data-bank="rhb">
                        <i class="fas fa-university"></i>
                        <p>RHB Bank</p>
                    </div>
                </div>

                <div class="form-group">
                    <label for="accountNumber">Account Number</label>
                    <input type="text" id="accountNumber" name="accountNumber" required>
                </div>

                <div class="form-group">
                    <label for="accountId">Account ID</label>
                    <input type="text" id="accountId" name="accountId" required>
                </div>

                <input type="hidden" id="selectedBank" name="selectedBank" value="">
                <button type="submit" class="submit-btn" disabled>Confirm Payment</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const orderData = JSON.parse(sessionStorage.getItem('orderData'));
            if (!orderData) {
                window.location.href = 'checkout.html';
                return;
            }

            const bankOptions = document.querySelectorAll('.bank-option');
            const selectedBankInput = document.getElementById('selectedBank');
            const submitBtn = document.querySelector('.submit-btn');

            bankOptions.forEach(option => {
                option.addEventListener('click', function() {
                    bankOptions.forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedBankInput.value = this.getAttribute('data-bank');
                    submitBtn.disabled = false;
                });
            });

            document.getElementById('onlineBankingForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const submitBtn = this.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

                const userData = JSON.parse(sessionStorage.getItem('user'));
                
                // Store payment data in session storage
                const paymentData = {
                    method: 'online_banking',
                    bank: selectedBankInput.value,
                    accountNumber: document.getElementById('accountNumber').value,
                    accountId: document.getElementById('accountId').value,
                    username: userData.username,
                    email: userData.email,
                    items: orderData.items || [],
                    subtotal: orderData.subtotal || 0,
                    shipping: orderData.shipping || 0,
                    total: orderData.total || 0,
                    timestamp: new Date().toISOString()
                };
                console.log('Storing payment data:', paymentData);
                sessionStorage.setItem('paymentData', JSON.stringify(paymentData));

                // Simulate payment processing
                setTimeout(() => {
                    window.location.href = 'receipt.html';
                }, 2000);
            });
        });
    </script>
</body>
</html>
