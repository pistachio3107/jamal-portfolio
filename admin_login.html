<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        :root {
            --gold: #d4af37;
            --black: #000;
            --white: #fff;
            --dark-gray: #111;
            --gray: #aaa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body {
            background: var(--dark-gray);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: var(--black);
            padding: 2rem;
            border-radius: 8px;
            width: 300px;
        }
        .login-container h2 {
            color: var(--gold);
            text-align: center;
            margin-bottom: 1rem;
        }
        .login-container label {
            display: block;
            margin-bottom: 0.25rem;
        }
        .login-container input {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--gray);
            border-radius: 4px;
            background: var(--dark-gray);
            color: var(--white);
        }
        .login-container button {
            width: 100%;
            padding: 0.5rem;
            background: var(--gold);
            border: none;
            border-radius: 4px;
            color: var(--black);
            font-weight: bold;
            cursor: pointer;
        }
        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 0.5rem;
            display: none;
        }
        .error.show { display: block; }
        .demo-note {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.45);
            border-radius: 4px;
            line-height: 1.5;
            margin-bottom: 1rem;
            padding: 0.75rem;
        }
        .demo-note strong { color: var(--gold); }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Admin Login</h2>
        <div class="demo-note">
            <strong>Read-only portfolio admin</strong><br>
            Username: <code>admin-demo</code><br>
            Password: <code>Admin123!</code>
        </div>
        <form id="adminLoginForm" method="post" action="admin_login.py">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" value="admin-demo" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" value="Admin123!" required>
            <button type="submit">Login</button>
            <div id="error" class="error"></div>
        </form>
    </div>

    <script>
        // Inline JavaScript to handle the form submission
        document.getElementById('adminLoginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevents the default form submission
            const formData = new FormData(this);

            fetch('admin_login.py', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(json => {
                if (json.success) {
                    // Redirect if login is successful
                    window.location.href = 'admin_dashboard.html';
                } else {
                    const errorDiv = document.getElementById('error');
                    errorDiv.textContent = json.message || 'Login failed';
                    errorDiv.classList.add('show');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                const errorDiv = document.getElementById('error');
                errorDiv.textContent = 'Something went wrong. Please try again.';
                errorDiv.classList.add('show');
            });
        });
    </script>
</body>
</html>
