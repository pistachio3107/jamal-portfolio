<!DOCTYPE html>
<html>
  <head>
    <title>Jamal | Receipt</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script src="js/cartManager.js"></script>
    <style>
      :root {
        --gold: #d4af37;
        --black: #000;
        --white: #fff;
        --dark-gray: #111;
        --gray: #aaa;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background-color: var(--black);
        color: var(--white);
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
        background-color: var(--dark-gray);
        border-bottom: 1px solid var(--gold);
      }

      .logo h1 {
        font-size: 28px;
      }

      .receipt-container {
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
      }

      .receipt {
        background-color: var(--dark-gray);
        padding: 30px;
        border-radius: 8px;
        border: 1px solid var(--gold);
      }

      .receipt-header {
        text-align: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 2px solid var(--gold);
      }

      .receipt-logo {
        color: var(--gold);
        font-size: 32px;
        margin-bottom: 10px;
      }

      .receipt-title {
        color: var(--gold);
        font-size: 24px;
        margin-bottom: 5px;
      }

      .order-info {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
      }

      .info-group {
        margin-bottom: 15px;
      }

      .info-label {
        color: var(--gray);
        margin-bottom: 5px;
      }

      .info-value {
        color: var(--white);
        font-size: 1.1em;
      }

      .order-items {
        margin-bottom: 30px;
      }

      .item-row {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr;
        padding: 10px 0;
        border-bottom: 1px solid var(--gray);
      }

      .item-info {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .item-thumbnail {
        width: 50px;
        height: 50px;
        object-fit: contain;
        background-color: var(--dark-gray);
        border: 1px solid var(--gold);
        border-radius: 4px;
        padding: 5px;
      }

      .item-header {
        font-weight: bold;
        color: var(--gold);
        border-bottom: 2px solid var(--gold);
      }

      .total-section {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 2px solid var(--gold);
      }

      .total-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .total-row.final {
        font-weight: bold;
        color: var(--gold);
        font-size: 1.2em;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid var(--gray);
      }

      .actions {
        display: flex;
        gap: 20px;
        margin-top: 30px;
      }

      .action-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background-color: var(--dark-gray);
        color: var(--gold);
        border: 1px solid var(--gold);
        padding: 15px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        transition: all 0.3s ease;
      }

      .action-btn:hover {
        background-color: var(--gold);
        color: var(--black);
        transform: translateY(-2px);
      }

      @media print {
        body {
          background: white;
          color: black;
        }
        
        .receipt {
          border: none;
          background: white;
        }
        
        .actions {
          display: none;
        }

        header {
          display: none;
        }

        .item-thumbnail {
          border-color: black;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <h1>
          <a href="index.html" style="text-decoration: none; color: var(--gold)"
            >JAMAL</a
          >
        </h1>
      </div>
    </header>

    <div class="receipt-container">
      <div class="receipt">
        <div class="receipt-header">
          <div class="receipt-logo">JAMAL</div>
          <h2 class="receipt-title">Payment Receipt</h2>
          <p id="receiptDate"></p>
        </div>

        <div class="order-info">
          <div>
            <div class="info-group">
              <div class="info-label">Order ID</div>
              <div class="info-value" id="orderId"></div>
            </div>
            <div class="info-group">
              <div class="info-label">Payment Method</div>
              <div class="info-value" id="paymentMethod"></div>
            </div>
          </div>
          <div>
            <div class="info-group">
              <div class="info-label">Customer Name</div>
              <div class="info-value" id="customerName"></div>
            </div>
            <div class="info-group">
              <div class="info-label">Email</div>
              <div class="info-value" id="customerEmail"></div>
            </div>
          </div>
        </div>

        <div class="order-items">
          <div class="item-row item-header">
            <div>Item</div>
            <div>Quantity</div>
            <div>Price</div>
            <div>Total</div>
          </div>
          <div id="itemsList">
            <!-- Items will be inserted here by JavaScript -->
          </div>
        </div>

        <div class="total-section">
          <div class="total-row">
            <span>Subtotal</span>
            <span id="subtotal"></span>
          </div>
          <div class="total-row">
            <span>Shipping</span>
            <span id="shipping"></span>
          </div>
          <div class="total-row final">
            <span>Total</span>
            <span id="total"></span>
          </div>
        </div>

        <div class="actions">
          <button class="action-btn" onclick="printReceipt()">
            <i class="fas fa-print"></i> Print Receipt
          </button>
          <a class="action-btn" href="index.html">
            <i class="fas fa-shopping-bag"></i> Continue Shopping
          </a>
        </div>
      </div>
    </div>

    <script src="js/receipt.js"></script>
  </body>
</html>
