<!DOCTYPE html>
<html>
  <head>
    <title>Jamal | Checkout</title>    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script src="js/cartManager.js"></script>
    <style>
      :root {
        --gold: #d4af37;
        --black: #000;
        --white: #fff;
        --dark-gray: #111;
        --gray: #aaa;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background-color: var(--black);
        color: var(--white);
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
        background-color: var(--dark-gray);
        border-bottom: 1px solid var(--gold);
      }

      .logo h1 {
        font-size: 28px;
      }

      .menu-bar {
        display: flex;
        gap: 20px;
        align-items: center;
      }

      .menu-item {
        color: var(--white);
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 4px;
        transition: all 0.3s ease;
        font-weight: bold;
      }

      .menu-item:hover {
        color: var(--gold);
        background-color: rgba(212, 175, 55, 0.1);
      }

      .checkout-container {
        max-width: 1200px;
        margin: 40px auto;
        padding: 20px;
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 40px;
      }

      .order-section, .payment-section {
        background-color: var(--dark-gray);
        padding: 30px;
        border-radius: 8px;
        border: 1px solid var(--gold);
      }

      .section-title {
        color: var(--gold);
        margin-bottom: 30px;
        font-size: 24px;
      }

      .cart-item {
        display: flex;
        align-items: center;
        padding: 15px;
        border-bottom: 1px solid var(--gray);
      }

      .cart-item img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        margin-right: 20px;
      }

      .item-details {
        flex: 1;
      }

      .item-details h3 {
        margin-bottom: 5px;
        color: var(--white);
      }

      .item-details p {
        color: var(--gray);
        margin-bottom: 5px;
      }

      .item-total {
        color: var(--gold) !important;
        font-weight: bold;
      }

      .payment-options {
        display: grid;
        gap: 15px;
        margin-bottom: 30px;
      }

      .payment-option {
        display: flex;
        align-items: center;
        padding: 15px;
        background-color: var(--black);
        border: 1px solid var(--gray);
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .payment-option:hover {
        border-color: var(--gold);
      }

      .payment-option.active {
        border-color: var(--gold);
        background-color: rgba(212, 175, 55, 0.1);
      }

      .payment-option i {
        font-size: 24px;
        margin-right: 15px;
        color: var(--gold);
      }

      .payment-option span {
        font-size: 16px;
        color: var(--white);
      }

      .submit-btn {
        background-color: var(--gold);
        color: var(--black);
        padding: 15px 30px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        width: 100%;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
      }

      .submit-btn:hover {
        background-color: #e6c555;
        transform: translateY(-2px);
      }

      .submit-btn:disabled {
        background-color: var(--gray);
        cursor: not-allowed;
        transform: none;
      }

      .total-section {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--gray);
      }

      .total-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        color: var(--white);
      }

      .total-row.final {
        color: var(--gold);
        font-weight: bold;
        font-size: 1.2em;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <h1>
          <a href="index.html" style="text-decoration: none; color: var(--gold)"
            >JAMAL</a
          >
        </h1>
      </div>
      <nav class="menu-bar">
        <a href="index.html" class="menu-item"><i class="fas fa-home"></i> Home</a>
        <a href="cart.html" class="menu-item"><i class="fas fa-shopping-cart"></i> Cart</a>
        <a href="profile.html" class="menu-item"><i class="fas fa-user"></i> Profile</a>
      </nav>
    </header>

    <div class="checkout-container">
      <div class="order-section">
        <h2 class="section-title">Order Summary</h2>
        <div id="cartItems"></div>
        <div class="total-section">
          <div class="total-row final">
            <span>Total</span>
            <span id="total">RM 0.00</span>
          </div>
        </div>
      </div>

      <div class="payment-section">
        <h2 class="section-title">Payment Method</h2>
        <form id="checkoutForm">
          <input type="hidden" id="selectedMethod" name="selectedMethod" value="">
          <div class="payment-options">
            <div class="payment-option" data-method="credit_card">
              <i class="fas fa-credit-card"></i>
              <span>Credit Card</span>
            </div>
            <div class="payment-option" data-method="online_banking">
              <i class="fas fa-university"></i>
              <span>Online Banking</span>
            </div>
            <div class="payment-option" data-method="e_wallet">
              <i class="fas fa-wallet"></i>
              <span>E-Wallet</span>
            </div>
          </div>
          <button type="submit" id="proceedBtn" class="submit-btn" disabled>Proceed to Payment</button>
        </form>
      </div>
    </div>

    <script src="js/checkout.js"></script>
  </body>
</html>
